plugins {
    id 'application'
}

dependencyLocking {
    lockAllConfigurations()
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

tasks.withType(JavaCompile).configureEach {
    options.release = 11
}

repositories {
    mavenCentral()
    maven {
        url = uri('https://jitpack.io')
    }
}

dependencies {
    implementation 'com.github.stripe:mpp-java:fdc37fd4b0fdbb57830d40edf61c12c4e09b4ae8'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.21.4'
}

application {
    mainClass = 'xyz.tempo.mpp.conformance.Adapter'
}
