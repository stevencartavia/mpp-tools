version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/conformance"
    schedule:
      interval: "weekly"
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/conformance/adapters/rust"
    schedule:
      interval: "weekly"
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/conformance/adapters/python"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/conformance/adapters/go"
    schedule:
      interval: "weekly"
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "bundler"
    directory: "/conformance/adapters/ruby"
    schedule:
      interval: "weekly"
    groups:
      ruby-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/conformance/adapters/java"
    schedule:
      interval: "weekly"
    groups:
      java-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
