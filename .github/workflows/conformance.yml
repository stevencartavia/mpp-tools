name: SDK Conformance Tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  vectors:
    name: vector conformance (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - adapter: typescript
            install-target: install-ts
          - adapter: rust
            install-target: install-rust
          - adapter: python
            install-target: install-python
          - adapter: go
            install-target: install-go
          - adapter: ruby
            install-target: install-ruby
          - adapter: java
            install-target: install-java
    defaults:
      run:
        working-directory: conformance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: conformance/requirements.txt

      - name: Setup Node.js
        if: matrix.adapter == 'typescript'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: conformance/package-lock.json

      - name: Setup Rust
        if: matrix.adapter == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        if: matrix.adapter == 'rust'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: conformance/adapters/rust -> target

      - name: Setup Go
        if: matrix.adapter == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          check-latest: true
          cache-dependency-path: conformance/adapters/go/go.sum

      - name: Setup Java
        if: matrix.adapter == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            conformance/adapters/java/*.gradle
            conformance/adapters/java/gradle.lockfile
            conformance/adapters/java/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Ruby
        if: matrix.adapter == 'ruby'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: conformance/adapters/ruby

      - name: Install uv
        if: matrix.adapter == 'python'
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: conformance/adapters/python/uv.lock

      - name: Install runner dependencies
        run: python3 -m pip install -q -r requirements.txt

      - name: Install adapter dependencies
        run: make ${{ matrix.install-target }}

      - name: Run vector conformance
        env:
          ADAPTER: ${{ matrix.adapter }}
        run: |
          python3 scripts/vector_runner.py \
            --adapter "$ADAPTER" \
            --output json \
            > "results-${ADAPTER}.json" \
            2> "stderr-${ADAPTER}.log"

      - name: Upload vector results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vector-results-${{ matrix.adapter }}
          path: |
            conformance/results-${{ matrix.adapter }}.json
            conformance/stderr-${{ matrix.adapter }}.log
          if-no-files-found: warn

  flow:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.flow.outputs.status }}
      errors: ${{ steps.flow.outputs.errors }}
      sdk_summary: ${{ steps.sdk-versions.outputs.summary }}
    defaults:
      run:
        working-directory: conformance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: conformance/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: conformance/adapters/rust -> target

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
          check-latest: true
          cache-dependency-path: conformance/adapters/go/go.sum

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            conformance/adapters/java/*.gradle
            conformance/adapters/java/gradle.lockfile
            conformance/adapters/java/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: conformance/adapters/ruby

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: conformance/adapters/python/uv.lock

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('conformance/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: make install

      - name: Record SDK versions
        id: sdk-versions
        run: |
          TS_VERSION=$(node -p "require('./node_modules/mppx/package.json').version")
          RS_VERSION=$(cargo metadata --locked --manifest-path adapters/rust/Cargo.toml --format-version 1 | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(p["version"] for p in data["packages"] if p["name"]=="mpp"))')
          PY_VERSION=$(cd adapters/python && uv run --locked --python 3.12 python -c 'import importlib.metadata; print(importlib.metadata.version("pympp"))')
          GO_VERSION=$(cd adapters/go && go list -m -f '{{.Version}}' github.com/tempoxyz/mpp-go)
          RB_VERSION=$(cd adapters/ruby && BUNDLE_PATH=vendor/bundle bundle exec ruby -e 'puts Gem.loaded_specs.fetch("mpp-rb").version')
          JAVA_VERSION=$(python3 - <<'PY'
          import re
          text = open('adapters/java/build.gradle', encoding='utf-8').read()
          print(re.search(r"com\.github\.stripe:mpp-java:([^'\"]+)", text).group(1))
          PY
          )
          echo "ts=$TS_VERSION" >> "$GITHUB_OUTPUT"
          echo "rs=$RS_VERSION" >> "$GITHUB_OUTPUT"
          echo "py=$PY_VERSION" >> "$GITHUB_OUTPUT"
          echo "go=$GO_VERSION" >> "$GITHUB_OUTPUT"
          echo "rb=$RB_VERSION" >> "$GITHUB_OUTPUT"
          echo "java=$JAVA_VERSION" >> "$GITHUB_OUTPUT"
          echo "summary=mppx@${TS_VERSION} mpp@${RS_VERSION} pympp@${PY_VERSION} github.com/tempoxyz/mpp-go@${GO_VERSION} mpp-rb@${RB_VERSION} com.github.stripe:mpp-java@${JAVA_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Run flow conformance tests
        id: flow
        run: |
          if python3 scripts/flow_runner.py > flow.log 2>&1; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
            python3 - <<'PY' flow.log > flow-errors.txt
          import sys
          from pathlib import Path

          lines = Path(sys.argv[1]).read_text().splitlines()
          for line in lines[:60]:
              print(line)
          PY
            {
              echo "errors<<EOF"
              cat flow-errors.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

  conformance:
    runs-on: ubuntu-latest
    needs:
      - vectors
      - flow
    if: always()
    defaults:
      run:
        working-directory: conformance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download vector results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: vector-results-*
          path: conformance/vector-results
          merge-multiple: true

      - name: Merge vector results
        id: vectors
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          adapters = ["typescript", "rust", "python", "go", "ruby", "java"]
          result_dir = Path("vector-results")
          merged = {
              "status": "pass",
              "num_checks": 0,
              "passed": 0,
              "failed": 0,
              "errors": [],
          }

          for adapter in adapters:
              result_path = result_dir / f"results-{adapter}.json"
              stderr_path = result_dir / f"stderr-{adapter}.log"
              try:
                  result = json.loads(result_path.read_text(encoding="utf-8"))
              except Exception as exc:
                  stderr = stderr_path.read_text(encoding="utf-8").strip() if stderr_path.exists() else ""
                  merged["failed"] += 1
                  merged["num_checks"] += 1
                  merged["errors"].append({
                      "adapter": adapter,
                      "vector": "runner",
                      "test_type": "build",
                      "test_name": "runner",
                      "error": stderr or f"Could not read {result_path}: {exc}",
                  })
                  continue

              merged["passed"] += int(result.get("passed", 0))
              merged["failed"] += int(result.get("failed", 0))
              merged["num_checks"] += int(result.get("num_checks", 0))
              merged["errors"].extend(result.get("errors", []))

          if merged["failed"]:
              merged["status"] = "fail"

          Path("results.json").write_text(json.dumps(merged, indent=2), encoding="utf-8")
          PY
          STATUS=$(python3 -c "import json; r=json.load(open('results.json')); print(r.get('status','fail'))" 2>/dev/null || echo fail)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          PASSED=$(python3 -c "import json; r=json.load(open('results.json')); print(r.get('passed',0))" 2>/dev/null || echo 0)
          FAILED=$(python3 -c "import json; r=json.load(open('results.json')); print(r.get('failed',0))" 2>/dev/null || echo 0)
          TOTAL=$(python3 -c "import json; r=json.load(open('results.json')); print(r.get('num_checks',0))" 2>/dev/null || echo 0)
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "pass" ]; then
            python3 -c "
          import json
          r = json.load(open('results.json'))
          for e in r.get('errors', [])[:20]:
              print(f\"- {e['adapter']}::{e['vector']}::{e['test_type']}::{e['test_name']}\")
              if e.get('error'):
                  print(f\"  {e['error'][:200]}\")
          " > errors.txt
            {
              echo "errors<<EOF"
              cat errors.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Determine overall status
        id: overall
        run: |
          if [ "${{ needs.vectors.result }}" = "success" ] && [ "${{ needs.flow.result }}" = "success" ] && [ "${{ steps.vectors.outputs.status }}" = "pass" ] && [ "${{ needs.flow.outputs.status }}" = "pass" ]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Check existing issues
        id: check-issue
        if: github.event_name != 'pull_request'
        run: |
          EXISTING=$(gh issue list --label conformance-failure --state open --limit 1 --json number -q '.[0].number')
          echo "existing=$EXISTING" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Open or update GitHub issue on failure
        if: github.event_name != 'pull_request' && steps.overall.outputs.status != 'pass'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(cat <<'ISSUE_BODY'
          ## Conformance tests failing

          **Date:** ${{ github.event.repository.updated_at }}
          **SDK Versions:** ${{ needs.flow.outputs.sdk_summary }}
          **Vector Results:** ${{ steps.vectors.outputs.passed }} passed, ${{ steps.vectors.outputs.failed }} failed, ${{ steps.vectors.outputs.total }} total
          **Flow Results:** ${{ needs.flow.outputs.status }}
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ### Vector Failures

          ${{ steps.vectors.outputs.errors }}

          ### Flow Failures

          ${{ needs.flow.outputs.errors }}

          ### Reproduction

          ```bash
          git clone ${{ github.server_url }}/${{ github.repository }}
          cd mpp-tools
          cd conformance && make install && make test && make flow
          ```
          ISSUE_BODY
          )

          if [ -n "${{ steps.check-issue.outputs.existing }}" ]; then
            gh issue comment "${{ steps.check-issue.outputs.existing }}" --body "$BODY"
          else
            gh issue create \
              --title "Conformance tests failing" \
              --body "$BODY" \
              --label conformance-failure
          fi

      - name: Close issue on recovery
        if: github.event_name != 'pull_request' && steps.overall.outputs.status == 'pass' && steps.check-issue.outputs.existing != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close "${{ steps.check-issue.outputs.existing }}" \
            --comment "Conformance tests passing again. SDKs: ${{ needs.flow.outputs.sdk_summary }}"

      - name: Fail workflow if tests failed
        if: steps.overall.outputs.status != 'pass'
        run: exit 1
