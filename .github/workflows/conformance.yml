name: SDK Conformance Tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_call:
    outputs:
      overall_status:
        description: Overall conformance status.
        value: ${{ jobs.conformance.outputs.status }}
      vector_passed:
        description: Number of passing vector checks.
        value: ${{ jobs.conformance.outputs.vector_passed }}
      vector_failed:
        description: Number of failing vector checks.
        value: ${{ jobs.conformance.outputs.vector_failed }}
      vector_total:
        description: Total vector checks.
        value: ${{ jobs.conformance.outputs.vector_total }}
      vector_errors:
        description: Vector failure summary.
        value: ${{ jobs.conformance.outputs.vector_errors }}
      flow_status:
        description: Flow conformance status.
        value: ${{ jobs.conformance.outputs.flow_status }}
      flow_errors:
        description: Flow failure summary.
        value: ${{ jobs.conformance.outputs.flow_errors }}
      sdk_summary:
        description: SDK versions used by flow tests.
        value: ${{ jobs.conformance.outputs.sdk_summary }}

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: select conformance scope
    runs-on: ubuntu-latest
    outputs:
      adapters_csv: ${{ steps.select.outputs.adapters_csv }}
      adapters_json: ${{ steps.select.outputs.adapters_json }}
      run_conformance: ${{ steps.select.outputs.run_conformance }}
      reason: ${{ steps.select.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Collect changed files
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --paginate \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '.[].filename' > changed-files.txt

      - name: Create empty changed file list
        if: github.event_name != 'pull_request'
        run: touch changed-files.txt

      - name: Select adapters
        id: select
        run: |
          python3 conformance/scripts/select_ci_adapters.py \
            --event-name "${{ github.event_name }}" \
            --changed-files changed-files.txt

      - name: Write summary
        run: |
          {
            echo "### Conformance scope"
            echo ""
            echo "- Run conformance: \`${{ steps.select.outputs.run_conformance }}\`"
            echo "- Adapters: \`${{ steps.select.outputs.adapters_csv || 'none' }}\`"
            echo "- Reason: ${{ steps.select.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  vectors:
    name: vector conformance (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_conformance == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.adapters_json) }}
    defaults:
      run:
        working-directory: conformance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup conformance adapter
        uses: ./.github/actions/setup-conformance
        with:
          adapter: ${{ matrix.adapter }}

      - name: Install runner dependencies
        run: python3 -m pip install -q -r requirements.txt

      - name: Check Java Gradle locks
        if: matrix.adapter == 'java'
        run: |
          cd adapters/java
          ./gradlew --no-daemon dependencies --write-locks
          git diff --exit-code -- gradle.lockfile

      - name: Install adapter dependencies
        run: make ${{ matrix.install-target }}

      - name: Run vector conformance
        env:
          ADAPTER: ${{ matrix.adapter }}
        run: |
          python3 scripts/vector_runner.py \
            --adapter "$ADAPTER" \
            --output json \
            > "results-${ADAPTER}.json" \
            2> "stderr-${ADAPTER}.log"

      - name: Upload vector results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vector-results-${{ matrix.adapter }}
          path: |
            conformance/results-${{ matrix.adapter }}.json
            conformance/stderr-${{ matrix.adapter }}.log
          if-no-files-found: warn

  flow:
    name: flow conformance (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_conformance == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.adapters_json) }}
    defaults:
      run:
        working-directory: conformance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup conformance adapter
        uses: ./.github/actions/setup-conformance
        with:
          adapter: ${{ matrix.adapter }}
          setup-node: "true"

      - name: Install runner dependencies
        run: make install-runner

      - name: Check Java Gradle locks
        if: matrix.adapter == 'java'
        run: |
          cd adapters/java
          ./gradlew --no-daemon dependencies --write-locks
          git diff --exit-code -- gradle.lockfile

      - name: Install adapter dependencies
        if: matrix.adapter != 'typescript'
        run: make ${{ matrix.install-target }}

      - name: Run flow conformance tests
        env:
          ADAPTER: ${{ matrix.adapter }}
        run: |
          set +e
          python3 scripts/flow_runner.py --adapter "$ADAPTER" > "flow-${ADAPTER}.log" 2>&1
          status=$?
          sdk_summary=$(python3 scripts/sdk_version.py --adapter "$ADAPTER" 2>/dev/null || true)
          python3 scripts/write_flow_result.py \
            --adapter "$ADAPTER" \
            --status-code "$status" \
            --log "flow-${ADAPTER}.log" \
            --sdk-summary "$sdk_summary" \
            --output "flow-${ADAPTER}.json"
          exit "$status"

      - name: Upload flow results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: flow-results-${{ matrix.adapter }}
          path: |
            conformance/flow-${{ matrix.adapter }}.json
            conformance/flow-${{ matrix.adapter }}.log
          if-no-files-found: warn

  server_verify:
    name: server verification conformance
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_conformance == 'true'
    defaults:
      run:
        working-directory: conformance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup conformance adapter
        uses: ./.github/actions/setup-conformance
        with:
          adapter: go

      - name: Install runner dependencies
        run: python3 -m pip install -q -r requirements.txt

      - name: Install Go adapter dependencies
        run: make install-go

      - name: Run server verification conformance
        run: python3 scripts/server_verify_runner.py --adapter go

  conformance:
    runs-on: ubuntu-latest
    needs:
      - changes
      - vectors
      - flow
      - server_verify
    if: always()
    outputs:
      status: ${{ steps.overall.outputs.status }}
      vector_passed: ${{ steps.vectors.outputs.passed }}
      vector_failed: ${{ steps.vectors.outputs.failed }}
      vector_total: ${{ steps.vectors.outputs.total }}
      vector_errors: ${{ steps.vectors.outputs.errors }}
      flow_status: ${{ steps.flows.outputs.status }}
      flow_errors: ${{ steps.flows.outputs.errors }}
      sdk_summary: ${{ steps.flows.outputs.sdk_summary }}
    defaults:
      run:
        working-directory: conformance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download vector results
        if: needs.changes.outputs.run_conformance == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: vector-results-*
          path: conformance/vector-results
          merge-multiple: true

      - name: Download flow results
        if: needs.changes.outputs.run_conformance == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: flow-results-*
          path: conformance/flow-results
          merge-multiple: true

      - name: Merge vector results
        id: vectors
        run: |
          python3 scripts/merge_vector_results.py \
            --adapters "${{ needs.changes.outputs.adapters_csv }}" \
            --result-dir vector-results \
            --output results.json

      - name: Merge flow results
        id: flows
        run: |
          python3 scripts/merge_flow_results.py \
            --adapters "${{ needs.changes.outputs.adapters_csv }}" \
            --result-dir flow-results \
            --output flow-results.json

      - name: Determine overall status
        id: overall
        run: |
          if [ "${{ needs.changes.outputs.run_conformance }}" != "true" ]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.vectors.result }}" = "success" ] && [ "${{ needs.flow.result }}" = "success" ] && [ "${{ needs.server_verify.result }}" = "success" ] && [ "${{ steps.vectors.outputs.status }}" = "pass" ] && [ "${{ steps.flows.outputs.status }}" = "pass" ]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi

      - name: Write summary
        run: |
          {
            echo "### SDK conformance"
            echo ""
            echo "- Status: \`${{ steps.overall.outputs.status }}\`"
            echo "- Adapters: \`${{ needs.changes.outputs.adapters_csv || 'none' }}\`"
            echo "- Vector results: ${{ steps.vectors.outputs.passed }} passed, ${{ steps.vectors.outputs.failed }} failed, ${{ steps.vectors.outputs.total }} total"
            echo "- Flow results: \`${{ steps.flows.outputs.status }}\`"
            echo "- Server verification: \`${{ needs.server_verify.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow if tests failed
        if: steps.overall.outputs.status != 'pass'
        run: exit 1
