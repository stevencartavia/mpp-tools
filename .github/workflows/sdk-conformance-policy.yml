name: SDK Conformance Policy

on:
  workflow_call:
    inputs:
      protocol-paths:
        description: Newline-separated SDK path globs that require conformance coverage when changed.
        required: true
        type: string
      default-conformance-ref:
        description: mpp-tools branch, tag, or SHA to use when no conformance override is required.
        required: false
        type: string
        default: main
      skip-label:
        description: Maintainer-applied label that allows protocol-sensitive changes without a conformance reference.
        required: false
        type: string
        default: conformance-not-needed
      conformance-paths:
        description: Newline-separated mpp-tools path globs that count as conformance coverage in a referenced Conformance-PR.
        required: false
        type: string
        default: |
          conformance/vectors/**
          conformance/flows/**
          conformance/schemas/**
          conformance/operations.json
    outputs:
      conformance_ref:
        description: mpp-tools ref that the SDK conformance workflow should use.
        value: ${{ jobs.policy.outputs.conformance_ref }}
      protocol_changed:
        description: Whether the PR changed a protocol-sensitive path.
        value: ${{ jobs.policy.outputs.protocol_changed }}

permissions:
  contents: read
  pull-requests: read

jobs:
  policy:
    name: conformance policy
    runs-on: ubuntu-latest
    outputs:
      conformance_ref: ${{ steps.policy.outputs.conformance_ref }}
      protocol_changed: ${{ steps.policy.outputs.protocol_changed }}

    steps:
      - name: Checkout policy scripts
        uses: actions/checkout@v6
        with:
          repository: tempoxyz/mpp-tools
          ref: ${{ inputs.default-conformance-ref }}
          path: mpp-tools

      - name: Collect changed files
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --paginate \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '.[].filename' > changed-files.txt

      - name: Create empty changed file list
        if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
        working-directory: .
        run: touch changed-files.txt

      - name: Check conformance coverage policy
        id: policy
        working-directory: .
        env:
          PROTOCOL_PATHS: ${{ inputs.protocol-paths }}
          DEFAULT_CONFORMANCE_REF: ${{ inputs.default-conformance-ref }}
          SKIP_LABEL: ${{ inputs.skip-label }}
        run: |
          python3 mpp-tools/conformance/scripts/check_conformance_policy.py \
            --event-path "$GITHUB_EVENT_PATH" \
            --changed-files changed-files.txt \
            --protocol-paths "$PROTOCOL_PATHS" \
            --default-conformance-ref "$DEFAULT_CONFORMANCE_REF" \
            --skip-label "$SKIP_LABEL"

      - name: Validate referenced conformance PR
        if: steps.policy.outputs.conformance_pr != ''
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          CONFORMANCE_PR: ${{ steps.policy.outputs.conformance_pr }}
          CONFORMANCE_PATHS: ${{ inputs.conformance-paths }}
        run: |
          gh api "repos/tempoxyz/mpp-tools/pulls/${CONFORMANCE_PR}" > conformance-pr.json
          gh api \
            --paginate \
            "repos/tempoxyz/mpp-tools/pulls/${CONFORMANCE_PR}/files" \
            --jq '.[].filename' > conformance-pr-files.txt

          python3 mpp-tools/conformance/scripts/validate_conformance_pr.py \
            --pr-json conformance-pr.json \
            --files conformance-pr-files.txt \
            --conformance-paths "$CONFORMANCE_PATHS"

      - name: Write summary
        if: always()
        env:
          CONFORMANCE_REF: ${{ steps.policy.outputs.conformance_ref }}
          PROTOCOL_CHANGED: ${{ steps.policy.outputs.protocol_changed }}
          MATCHED_FILES: ${{ steps.policy.outputs.matched_files }}
          POLICY_REASON: ${{ steps.policy.outputs.reason }}
          CONFORMANCE_PR: ${{ steps.policy.outputs.conformance_pr }}
        run: |
          {
            echo "### SDK conformance policy"
            echo ""
            echo "- Protocol-sensitive changes: \`${PROTOCOL_CHANGED:-unknown}\`"
            echo "- Conformance ref: \`${CONFORMANCE_REF:-unknown}\`"
            if [ -n "$CONFORMANCE_PR" ]; then
              echo "- Conformance PR: \`tempoxyz/mpp-tools#${CONFORMANCE_PR}\`"
            fi
            echo "- Reason: ${POLICY_REASON:-unknown}"
            if [ -n "$MATCHED_FILES" ]; then
              echo ""
              echo "Matched files:"
              printf '%s\n' "$MATCHED_FILES" | sed 's/^/- `/' | sed 's/$/`/'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
